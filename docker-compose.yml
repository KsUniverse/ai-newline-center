# ============================================================
# Docker Compose — ai-newline-center 生产部署
# 包含: app + PostgreSQL + Redis（可选择只用 app，外接宝塔已有数据库）
#
# 使用方式:
#   cp .env.production.example .env.docker
#   docker compose --env-file .env.docker up -d
#
# 如果宝塔已安装 PostgreSQL/Redis，请使用 docker-compose.app-only.yml
# ============================================================

services:
  # ---- MySQL ----
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_newline}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env.docker 中设置 MYSQL_ROOT_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?请在 .env.docker 中设置 REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  # ---- 数据库迁移（启动一次后自动退出）----
  migrate:
    image: ${APP_IMAGE:-ai-newline-center:latest}
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-ai_newline}?charset=utf8mb4
    command: >
      sh -c "npx --yes prisma@6 migrate deploy --schema=/app/prisma/schema.prisma"
    networks:
      - app-net

  # ---- Next.js 应用 ----
  app:
    image: ${APP_IMAGE:-ai-newline-center:latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-ai_newline}?charset=utf8mb4
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NEXTAUTH_URL: ${NEXTAUTH_URL:?请在 .env.docker 中设置 NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?请在 .env.docker 中设置 NEXTAUTH_SECRET}
      CRAWLER_API_URL: ${CRAWLER_API_URL:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
    volumes:
      # 持久化用户上传的封面和视频文件
      - uploads:/app/public/storage
    networks:
      - app-net

volumes:
  mysql_data:
  redis_data:
  uploads:

networks:
  app-net:
    driver: bridge
